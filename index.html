<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitty Party Invitation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #fdf2f2; /* Soft festive background */
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .card {
            width: 90%;
            max-width: 400px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border: 8px solid #fff;
            position: relative;
        }
        .header-bg {
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            padding: 40px 20px;
            text-align: center;
            color: #d84315;
        }
        .header-bg h1 {
            margin: 0;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 900;
        }
        .content {
            padding: 30px 25px;
            text-align: center;
        }
        .hindi-text {
            font-size: 18px;
            line-height: 1.6;
            color: #444;
            margin-bottom: 25px;
        }
        .details-box {
            background: #fff8f0;
            border: 1px dashed #e67e22;
            border-radius: 12px;
            padding: 20px;
            text-align: left;
        }
        .detail-row {
            margin: 10px 0;
            font-size: 16px;
            color: #2c3e50;
            display: flex;
            justify-content: space-between;
        }
        .label { font-weight: bold; color: #e67e22; }
        .footer {
            margin-top: 25px;
            font-style: italic;
            color: #e91e63;
            font-weight: bold;
        }
        .decor {
            position: absolute;
            font-size: 40px;
            opacity: 0.2;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header-bg">
        <h1>Kitty Party Invitation</h1>
    </div>

    <div class="content">
        <p class="hindi-text">
            नमस्ते सखियों! होली के चटकीले रंगों और नवरात्रि की भक्ति के सुंदर दिनों के बाद, अब समय है अपनी सहेलियों के साथ थोड़ा मुस्कुराने, खिलखिलाने और गपशप करने का!
        </p>

        <div class="details-box">
            <div class="detail-row">
                <span class="label">DATE:</span>
                <span>28 March, 2026</span>
            </div>
            <div class="detail-row">
                <span class="label">TIME:</span>
                <span>3:45 PM</span>
            </div>
            <div class="detail-row">
                <span class="label">VENUE:</span>
                <span>Our Home</span>
            </div>
        </div>

        <p class="footer">आपकी उपस्थिति का इंतज़ार रहेगा!</p>
        <p style="font-size: 14px; color: #7f8c8d;">- आपकी माताजी का नाम</p>
    </div>
</div>

</body>
</html>
